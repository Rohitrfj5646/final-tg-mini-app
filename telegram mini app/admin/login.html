<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — CryptoSignal Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0e1a;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(108, 99, 255, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(0, 214, 143, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .login-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 44px 36px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(20px);
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .logo { font-size: 48px; text-align: center; margin-bottom: 8px; }
    .login-card h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      text-align: center;
      background: linear-gradient(135deg, #e8eaf0, #6c63ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .login-card p { text-align: center; color: #8b90a7; font-size: 13px; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8b90a7;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 13px 16px;
      color: #e8eaf0;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
    }
    .form-group input:focus {
      border-color: #6c63ff;
      box-shadow: 0 0 0 3px rgba(108,99,255,0.2);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: linear-gradient(135deg, #6c63ff, #8a7fff);
      color: white;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.4);
      transition: all 0.2s;
      margin-top: 8px;
    }
    .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(108, 99, 255, 0.5); }
    .error-msg {
      color: #ff4c61;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">🛡️</div>
    <h1>Admin Panel</h1>
    <p>CryptoSignal Pro — Control Center</p>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="admin-username" placeholder="Enter username" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="admin-password" placeholder="Enter password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') adminLogin()" />
    </div>

    <button class="login-btn" onclick="adminLogin()" id="login-btn">🔐 Sign In</button>
    <div class="error-msg" id="error-msg">Invalid credentials. Please try again.</div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5000/api';

    // Redirect if already logged in
    if (localStorage.getItem('admin_token')) {
      window.location.href = 'index.html';
    }

    async function adminLogin() {
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value;
      const btn = document.getElementById('login-btn');
      const error = document.getElementById('error-msg');

      if (!username || !password) {
        error.textContent = 'Please enter username and password';
        error.classList.add('show');
        return;
      }

      btn.textContent = '⏳ Signing in...';
      btn.disabled = true;
      error.classList.remove('show');

      try {
        const resp = await fetch(`${API_BASE}/auth/admin-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await resp.json();

        if (data.success) {
          localStorage.setItem('admin_token', data.token);
          window.location.href = 'index.html';
        } else {
          throw new Error(data.message || 'Invalid credentials');
        }
      } catch (err) {
        error.textContent = err.message;
        error.classList.add('show');
        btn.textContent = '🔐 Sign In';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
